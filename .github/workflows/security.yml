# .github/workflows/security.yml
#
# Template reutilizable — escanea con 6 herramientas y sube cada reporte a
# Shield Dev. Cada job es independiente: si tu proyecto no aplica a alguna
# (ej: no hay Terraform para Checkov, o no hay ambiente desplegado para ZAP),
# borrá ese job entero.
#
# Setup necesario (Settings → Secrets and variables → Actions):
#   Secrets:   SHIELDDEV_URL, SHIELDDEV_TOKEN
#   Variables: APP_URL (solo si usás el job de ZAP)
#
# Nota sobre GitLeaks: gitleaks/gitleaks-action@v2 NO tiene forma de
# configurar la ruta/formato del reporte (no existe GITLEAKS_REPORT_PATH) y
# por defecto produce SARIF, no el JSON nativo que espera Shield Dev — por
# eso este job usa la CLI de Gitleaks directo por Docker en vez de la action.

name: Security Scan

on:
    push:
        branches:
        - main
        - dev
        - staging

    pull_request:


env:
    SHIELDDEV_URL: ${{ secrets.SHIELDDEV_URL }}
    SHIELDDEV_TOKEN: ${{ secrets.SHIELDDEV_TOKEN }}
    PROJECT_NAME: ${{ github.repository }}
    APP_URL: ${{ secrets.APP_URL }}


jobs:

  # ───────────────────────────────────────
  # GitLeaks - Secrets
  # ───────────────────────────────────────
  gitleaks:
    name: GitLeaks — Secrets
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
            fetch-depth: 0


      - name: Run GitLeaks
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect \
            --source /repo \
            --no-git \
            --report-format json \
            --report-path /repo/gitleaks-report.json


      - name: Upload to Shield Dev
        run: |
          curl -X POST "$SHIELDDEV_URL/api/v1/import/gitleaks" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            --data-binary @gitleaks-report.json



  # ───────────────────────────────────────
  # Trivy - Docker Image
  # ───────────────────────────────────────
  trivy:
    name: Trivy — Container Vulnerabilities
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Build Docker Image
        run: |
          docker build \
            -t shielddev-image:${{ github.sha }} .


      - name: Run Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: shielddev-image:${{ github.sha }}
          format: json
          output: trivy-report.json
          exit-code: 0
          ignore-unfixed: false
          vuln-type: os,library


      - name: Upload to Shield Dev
        run: |
          curl -X POST "$SHIELDDEV_URL/api/v1/import/trivy" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            --data-binary @trivy-report.json



  # ───────────────────────────────────────
  # OWASP Dependency Check
  # ───────────────────────────────────────
  depcheck:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
            npm install
            npm install --package-lock

      - name: Run Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: .
          format: JSON
          out: .


      - name: Upload to Shield Dev
        run: |
          curl -X POST "$SHIELDDEV_URL/api/v1/import/depcheck" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            --data-binary @dependency-check-report.json



  # ───────────────────────────────────────
  # Semgrep - SAST
  # ───────────────────────────────────────
  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep


    steps:

      - uses: actions/checkout@v4


      - name: Run Semgrep
        run: |
          semgrep \
            --config=auto \
            --json \
            --output=semgrep-report.json . || true


      - name: Upload to Shield Dev
        run: |
          curl -X POST "$SHIELDDEV_URL/api/v1/import/semgrep" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            --data-binary @semgrep-report.json



  # ───────────────────────────────────────
  # Checkov - IaC
  # ───────────────────────────────────────
  checkov:
    name: Checkov — IaC
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Run Checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          output_format: json
          output_file_path: checkov-output
          soft_fail: true


      - name: Normalize Report
        if: always()
        run: |
          if sudo test -f checkov-output/results_json.json; then
            sudo mv \
              checkov-output/results_json.json \
              checkov-report.json
          fi


      - name: Upload to Shield Dev
        run: |
          curl -X POST "$SHIELDDEV_URL/api/v1/import/checkov" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            --data-binary @checkov-report.json



  # ───────────────────────────────────────
  # OWASP ZAP - DAST
  # ───────────────────────────────────────
  owasp-zap:
    name: OWASP ZAP — DAST
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4


      - name: Run OWASP ZAP
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.APP_URL }}
          fail_action: false
          cmd_options: "-J zap-report.json"


      - name: Upload to Shield Dev
        run: |
          curl -X POST "$SHIELDDEV_URL/api/v1/import/zap" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Repo: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            --data-binary @zap-report.json
