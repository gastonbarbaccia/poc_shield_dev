# .github/workflows/security.yml
#
# Template reutilizable — escanea con 6 herramientas y sube cada reporte a
# Shield Dev. Cada job es independiente: si tu proyecto no aplica a alguna
# (ej: no hay Terraform para Checkov, o no hay ambiente desplegado para ZAP),
# borrá ese job entero.
#
# Setup necesario (Settings → Secrets and variables → Actions):
#   Secrets:   SHIELDDEV_URL, SHIELDDEV_TOKEN
#   Variables: APP_URL (solo si usás el job de ZAP)
#
# Nota sobre GitLeaks: gitleaks/gitleaks-action@v2 NO tiene forma de
# configurar la ruta/formato del reporte (no existe GITLEAKS_REPORT_PATH) y
# por defecto produce SARIF, no el JSON nativo que espera Shield Dev — por
# eso este job usa la CLI de Gitleaks directo por Docker en vez de la action.

name: Security Scan
on:
  push:
    branches: [main, dev, staging]
  pull_request:

env:
  SHIELDDEV_URL: ${{ secrets.SHIELDDEV_URL }}
  SHIELDDEV_TOKEN: ${{ secrets.SHIELDDEV_TOKEN }}
  PROJECT_NAME: ${{ github.repository }}
  APP_URL: ${{ secrets.APP_URL }}
  # Opcionales -- si no se mandan, Shield Dev infiere ENVIRONMENT de X-Branch
  # y deja public_exposed en NULL (no se adivina). Ajustá según tu convención.
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || (github.ref_name == 'staging' && 'staging' || 'development') }}
  PUBLIC_EXPOSED: ${{ github.ref_name == 'main' && 'true' || 'false' }}

jobs:
  # ── GitLeaks ────────────────────────────────────────────────
  gitleaks:
    name: GitLeaks — Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --no-git -v \
            --report-format json --report-path /repo/gitleaks-report.json

      - name: Verify report exists
        if: always()
        run: test -f gitleaks-report.json || { echo "::error::gitleaks-report.json no existe — revisá el step 'Run GitLeaks'"; exit 1; }

      - name: Upload to Shield Dev
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST "$SHIELDDEV_URL/api/v1/import/gitleaks" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            -H "X-Repo: ${{ github.server_url }}/${{ github.repository }}" \
            -H "X-Environment: $ENVIRONMENT" \
            -H "X-Public-Exposed: $PUBLIC_EXPOSED" \
            --data-binary @gitleaks-report.json)
          [ "$STATUS" -lt 300 ] || { echo "::error::Import falló (HTTP $STATUS)"; cat response.json; exit 1; }

  # ── Trivy ───────────────────────────────────────────────────
  trivy:
    name: Trivy — Vulnerabilidades (imagen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t shielddev-image:${{ github.sha }} .

      - name: Run Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: shielddev-image:${{ github.sha }}
          format: json
          output: trivy-report.json
          exit-code: 0
          ignore-unfixed: false
          vuln-type: os,library

      - name: Verify report exists
        if: always()
        run: test -f trivy-report.json || { echo "::error::trivy-report.json no existe — revisá el step 'Run Trivy'"; exit 1; }

      - name: Upload to Shield Dev
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST "$SHIELDDEV_URL/api/v1/import/trivy" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            -H "X-Repo: ${{ github.server_url }}/${{ github.repository }}" \
            -H "X-Environment: $ENVIRONMENT" \
            -H "X-Public-Exposed: $PUBLIC_EXPOSED" \
            --data-binary @trivy-report.json)
          [ "$STATUS" -lt 300 ] || { echo "::error::Import falló (HTTP $STATUS)"; cat response.json; exit 1; }
          
  # ── OWASP Dependency Check ──────────────────────────────────
  depcheck:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
            npm install
            npm install --package-lock

      - name: Run Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: .
          format: JSON
          out: .

      - name: Verify report exists
        if: always()
        run: test -f dependency-check-report.json || { echo "::error::dependency-check-report.json no existe — revisá el step 'Run Dependency Check'"; exit 1; }

      - name: Upload to Shield Dev
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST "$SHIELDDEV_URL/api/v1/import/depcheck" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            -H "X-Repo: ${{ github.server_url }}/${{ github.repository }}" \
            -H "X-Environment: $ENVIRONMENT" \
            -H "X-Public-Exposed: $PUBLIC_EXPOSED" \
            --data-binary @dependency-check-report.json)
          [ "$STATUS" -lt 300 ] || { echo "::error::Import falló (HTTP $STATUS)"; cat response.json; exit 1; }

  # ── Semgrep ─────────────────────────────────────────────────
  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep --config=auto --json --output=semgrep-report.json . || true

      - name: Verify report exists
        if: always()
        run: test -f semgrep-report.json || { echo "::error::semgrep-report.json no existe — revisá el step 'Run Semgrep'"; exit 1; }

      - name: Upload to Shield Dev
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST "$SHIELDDEV_URL/api/v1/import/semgrep" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            -H "X-Repo: ${{ github.server_url }}/${{ github.repository }}" \
            -H "X-Environment: $ENVIRONMENT" \
            -H "X-Public-Exposed: $PUBLIC_EXPOSED" \
            --data-binary @semgrep-report.json)
          [ "$STATUS" -lt 300 ] || { echo "::error::Import falló (HTTP $STATUS)"; cat response.json; exit 1; }

  # ── Checkov ─────────────────────────────────────────────────
  checkov:
    name: Checkov — IaC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          output_format: json
          output_file_path: checkov-output
          soft_fail: true

      - name: Normalize Report
        if: always()
        run: |
          if sudo test -f checkov-output/results_json.json; then
            sudo mv \
              checkov-output/results_json.json \
              checkov-report.json
          fi

      - name: Upload to Shield Dev
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST "$SHIELDDEV_URL/api/v1/import/checkov" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            -H "X-Repo: ${{ github.server_url }}/${{ github.repository }}" \
            -H "X-Environment: $ENVIRONMENT" \
            -H "X-Public-Exposed: $PUBLIC_EXPOSED" \
            --data-binary @checkov-report.json)
          [ "$STATUS" -lt 300 ] || { echo "::error::Import falló (HTTP $STATUS)"; cat response.json; exit 1; }


  # ── OWASP ZAP ───────────────────────────────────────────────
  # Requiere un ambiente ya desplegado y accesible desde el runner (APP_URL).
  owasp-zap:
    name: OWASP ZAP — DAST
    runs-on: ubuntu-latest
    steps:
      - name: Run OWASP ZAP Baseline
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.APP_URL }}
          fail_action: false
          cmd_options: '-J zap-report.json'

      - name: Verify report exists
        if: always()
        run: test -f zap-report.json || { echo "::error::zap-report.json no existe — ¿APP_URL está seteada?"; exit 1; }

      - name: Upload to Shield Dev
        run: |
          STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST "$SHIELDDEV_URL/api/v1/import/zap" \
            -H "Authorization: Bearer $SHIELDDEV_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Project: $PROJECT_NAME" \
            -H "X-Branch: ${{ github.ref_name }}" \
            -H "X-Commit: ${{ github.sha }}" \
            -H "X-Repo: ${{ github.server_url }}/${{ github.repository }}" \
            -H "X-Environment: $ENVIRONMENT" \
            -H "X-Public-Exposed: $PUBLIC_EXPOSED" \
            --data-binary @zap-report.json)
          [ "$STATUS" -lt 300 ] || { echo "::error::Import falló (HTTP $STATUS)"; cat response.json; exit 1; }
